{% extends "base.html" %} {% block content %}
<div class="counter">{{ user.tokens }}</div>
<div class="level">Level {{ user.level }}</div>
<div class="button-container">
	<div class="enclo-button" onclick="collectDust()">X1</div>
</div>
<div class="bottom-buttons">
	<a href="{{ url_for('read_page1') }}">Page 1</a>
	<a href="{{ url_for('read_page2') }}">Page 2</a>
</div>
<script>
	async function collectDust() {
		const response = await fetch('/collect_dust/', {
			method: 'POST',
			headers: {
				'Content-Type': 'application/json',
			},
			body: JSON.stringify({ user_id: '{{ user.telegram_id }}' }),
		})
		const data = await response.json()
		document.querySelector('.counter').innerText = data.tokens
	}
</script>
{% endblock %}
