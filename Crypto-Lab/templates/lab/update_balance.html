<!-- templates/lab/update_balance.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Balance</title>
</head>
<body>
    <h1>Update Your Token Balance</h1>
    <form method="post">
        {% csrf_token %}
        <label for="amount">New Amount:</label>
        <input type="number" step="0.01" name="amount" id="amount" required>
        <button type="submit">Update</button>
    </form>
    <a href="{% url 'index' %}?user_id={{ request.GET.user_id }}">Back to Home</a>
</body>
</html>
