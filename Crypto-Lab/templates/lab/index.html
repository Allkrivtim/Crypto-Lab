<!-- templates/lab/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crypto-Lab</title>
</head>
<body>
    <h1>Welcome to Crypto-Lab!</h1>
    <p>Your current token balance is: {{ token.amount }}</p>
    <form action="{% url 'collect_dust' %}" method="get">
        <input type="hidden" name="user_id" value="{{ token.user.username }}">
        <button type="submit">Collect Dust</button>
    </form>
</body>
</html>
