{% extends "base.html" %}

{% block title %}Crypto Lab{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="counter" id="counter">{{ user.tokens }}</div>
    <div class="level">Level {{ user.level }}</div>
    <div class="button-container">
        <div class="circle-button" onclick="collectDust()">X1</div>
    </div>
    <div class="bottom-buttons">
        <button onclick="navigate('/lab/page1/?user_id={{ user.telegram_id }}')">Page 1</button>
        <button onclick="navigate('/lab/page2/?user_id={{ user.telegram_id }}')">Page 2</button>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function collectDust() {
        fetch('/lab/collect_dust/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ user_id: {{ user.telegram_id }} })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('counter').innerText = data.tokens;
        })
        .catch(error => console.error('Error:', error));
    }
</script>
{% endblock %}
