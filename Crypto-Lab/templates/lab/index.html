<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Lab</title>
    <style>
        /* Добавим минимальные стили для кнопки и счетчика */
        .button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: yellow;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }

        .counter {
            font-size: 36px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="counter">Tokens: <span id="tokenCount">{{ user.tokens }}</span></div>
    <div class="button" id="collectButton">Tap</div>

    <script>
        document.getElementById('collectButton').addEventListener('click', async function() {
            const response = await fetch('/lab/collect_dust/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({user_id: '{{ user.telegram_id }}'})
            });
            const data = await response.json();
            document.getElementById('tokenCount').textContent = data.tokens;
        });
    </script>
</body>
</html>
